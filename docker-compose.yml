services:
  db:
    image: postgres:15-alpine
    container_name: eventfinder-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eventfinder
    ports:
      - "5433:5432"
    volumes:
      - eventfinder-db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: eventfinder-redis
    ports:
      - "6380:6379"
    volumes:
      - eventfinder-redis-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: eventfinder-backend
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/eventfinder
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - /app/venv
      - eventfinder-uploads:/app/uploads

  worker:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: eventfinder-worker
    command: celery -A tasks worker --loglevel=info
    depends_on:
      - redis
      - db
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/eventfinder
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - /app/venv

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: eventfinder-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  eventfinder-db-data:
  eventfinder-redis-data:
  eventfinder-uploads:

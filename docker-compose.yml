services:
  db:
    image: postgres:15-alpine
    container_name: eventfinder-db
    restart: unless-stopped
    cpus: 0.1   # Projekt-Cap: eventfinder-Stack gesamt <= 0.6 CPU (30% von 2 Kernen)
    environment:
      POSTGRES_USER: eventfinder
      POSTGRES_PASSWORD: password
      POSTGRES_DB: eventfinder
    volumes:
      - eventfinder-db-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: eventfinder-redis
    restart: unless-stopped
    cpus: 0.05
    volumes:
      - eventfinder-redis-data:/data

  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: eventfinder-backend
    restart: unless-stopped
    cpus: 0.2
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://eventfinder:password@db:5432/eventfinder
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - /app/venv
      - eventfinder-uploads:/app/uploads

  worker:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.backend
    container_name: eventfinder-worker
    restart: unless-stopped
    cpus: 0.15
    command: celery -A tasks worker --loglevel=info
    depends_on:
      - redis
      - db
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://eventfinder:password@db:5432/eventfinder
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - /app/venv

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: eventfinder-frontend
    restart: unless-stopped
    cpus: 0.1
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend

volumes:
  eventfinder-db-data:
  eventfinder-redis-data:
  eventfinder-uploads:
